<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Résultats de recherche - Voyage Explorer</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div class="logo">
🌍 Voyage Explorer
</div>


<nav>

<a href="index.html">Accueil</a>
<a href="#">Hôtels</a>
<a href="#">Restaurants</a>
<a href="#">Avis</a>

</nav>


</header>


<section class="results">


<h1>
Résultats pour :
<span id="villeRecherche"></span>
</h1>



<div id="listeResultats"></div>



</section>

<footer>

<p>
© 2026 Voyage Explorer
</p>

</footer>







<script>


// Récupération de la recherche


let parametre = new URLSearchParams(window.location.search);


let recherche = parametre.get("destination");



if(recherche){

function rechercherDestination(event){

event.preventDefault();

let destination = document
.getElementById("destinationSearch")
.value
.toLowerCase()
.trim();


window.location.href =
"resultats.html?destination=" + destination;

}







// Base des destinations disponibles


let destinations = [


{
nom:"Paris",
pays:"France 🇫🇷",
image:"https://picsum.photos/500/300?paris",
description:"Tour Eiffel, Louvre, Montmartre et gastronomie française.",
page:"paris.html"
},



{
nom:"Rome",
pays:"Italie 🇮🇹",
image:"https://picsum.photos/500/300?rome",
description:"Colisée, Vatican et histoire antique.",
page:"rome.html"
},



{
nom:"Londres",
pays:"Royaume-Uni 🇬🇧",
image:"https://picsum.photos/500/300?london",
description:"Big Ben, musées et quartiers historiques.",
page:"londres.html"
},



{
nom:"Tokyo",
pays:"Japon 🇯🇵",
image:"https://picsum.photos/500/300?tokyo",
description:"Tradition japonaise et modernité.",
page:"tokyo.html"
},



{
nom:"Bretagne",
pays:"France 🇫🇷",
image:"https://picsum.photos/500/300?bretagne",
description:"Océan, villages et paysages sauvages.",
page:"bretagne.html"
}


];








let zone = document.getElementById("listeResultats");


let trouve = false;






destinations.forEach(function(destination){



if(destination.nom.toLowerCase().includes(recherche)){



trouve=true;



zone.innerHTML += `


<a class="result-card" href="${destination.page}">


<img src="${destination.image}" alt="${destination.nom}">


<div>

<h2>
${destination.nom}
</h2>


<p>
${destination.pays}
</p>


<p>
${destination.description}
</p>


<button>
Voir la destination
</button>


</div>


</a>


`;



}


});








if(!trouve){


zone.innerHTML = `


<div class="no-result">


<h2>
Aucune destination trouvée
</h2>


<p>
Essayez Paris, Rome, Londres, Tokyo ou Bretagne.
</p>


</div>


`;


}



</script>





</body>

</html>
